version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "7180:8000"
    volumes:
      - ./media:/app/media
      - static_data:/app/staticfiles
    env_file:
      - ../.env
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             uvicorn backend.asgi:application --host 0.0.0.0 --port 8000 --workers 4"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build: .
    command: celery -A backend worker --loglevel=INFO --concurrency=2
    volumes:
      - ./media:/app/media
    env_file:
      - ../.env
    depends_on:
      - web
      - redis
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A backend beat --loglevel=INFO
    volumes:
      - ./media:/app/media
    env_file:
      - ../.env
    depends_on:
      - web
      - redis
    restart: unless-stopped

volumes:
  static_data:
