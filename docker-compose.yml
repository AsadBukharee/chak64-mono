version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-mydb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "7180:8000"
    volumes:
      - ./backend/media:/app/media
      - static_data:/app/staticfiles
    environment:
      - ENV=prod
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-mydb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             uvicorn backend.asgi:application --host 0.0.0.0 --port 8000 --workers 4"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: celery -A backend worker --loglevel=INFO --concurrency=2
    volumes:
      - ./backend/media:/app/media
    environment:
      - ENV=prod
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-mydb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - web
      - redis
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: celery -A backend beat --loglevel=INFO
    volumes:
      - ./backend/media:/app/media
    environment:
      - ENV=prod
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-mydb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - web
      - redis
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: celery -A backend flower --port=5555 --host=0.0.0.0 --broker_api=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.fosterhartley.uk`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.flower-svc.loadbalancer.server.port=5555"

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # MinIO API (S3)
      - "traefik.http.routers.minio.rule=Host(`minio.fosterhartley.uk`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio.service=minio-svc"
      - "traefik.http.services.minio-svc.loadbalancer.server.port=9000"
      # MinIO Console
      - "traefik.http.routers.minio-console.rule=Host(`console.minio.fosterhartley.uk`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=minio-console-svc"
      - "traefik.http.services.minio-console-svc.loadbalancer.server.port=9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 15s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  static_data:
